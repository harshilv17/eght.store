services:
  - type: web
    name: eght-backend
    env: node
    plan: free # 🟢 Added this
    region: oregon # 🟢 Changed to Oregon (best for free tier)
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Neon free Postgres (does not expire like Render's free DB).
      # Set this value in the Render dashboard → Environment → DATABASE_URL.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://eght-store.vercel.app # 🔴 Replace with your actual frontend URL

# Render free Postgres expires after 30 days. Using external Neon DB instead (see DATABASE_URL above).
