services:
  - type: web
    name: eght-backend
    env: node
    region: singapore # change to oregon / frankfurt if preferred
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eght-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://eght-store.vercel.app # 🔴 Replace with your actual frontend URL

databases:
  - name: eght-db
    databaseName: eght_db
    region: singapore # must match the web service region above
    plan: free
